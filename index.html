<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>YouCode 2026</title>
        <meta name="viewport" content="width=device-width, intital-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    </head>
    <body>
        <!-- Navigation bar -->
        <nav class="top-nav">
            <div class="nav-left">
                <button class="link" onclick="showInfo()">About</button>
                <button class="link" onclick="showResources()">Resources</button>
            </div>
            <div class="title">YouCode</div>
            <div class="nav-right">
                <select class="lang-select" id="langSelect">
                    <option value="en">🌐 EN</option>
                    <option value="fr">FR</option>
                    <option value="es">ES</option>
                    <option value="zh">中文</option>
                </select>
            </div>
        </nav>
        <!-- Main -->
        <div id="app">
            <!-- Search screen -->
            <div class="search-screen" id="searchScreen">
                <!-- <div class="title">YouCode</div> -->
                <div class="search-wrap">
                    <input class="search-input" id="input" type="text" placeholder="Enter your shelter name">
                    <button class="search-button" id="button">Enter</button>
                    <div class="suggestions" id="suggestions"></div>
                </div>
                <div id="map">
                    <div class="leaflet-pane leaflet-map-pane">
                        <div class="leaflet-pane leaflet-title-pane">
                            <div class="leaflet-layer">
                                <div class="leaflet-tile-container leaflet-zoom-animated"></div>
                                <div class="leaflet-tile-container leaflet-zoom-animated"></div>
                            </div>
                        </div>
                        <div class="leaflet-pane leaflet-overlay-pane"></div>
                        <div class="leaflet-proxy leaflet-zoom-animated"></div>
                    </div> 
                    <div class="leaflet-control-container">
                        <div class="leaflet-top leaflet-left">
                            <div class="leaflet-control-zoom leaflet-bar leaflet-control">
                                <a class="leaflet-control-zoom-in leaflet-disabled" href="#" title="Zoom in" role="button" aria-label="Zoom in" aria-disabled="true">
                                    <span aria-hidden="true">+</span>
                                </a>
                                <a class="leaflet-control-zoom-out" href="#" title="Zoom out" role="button" aria-label="Zoom out" aria-disabled="false">
                                    <span aria-hidden="true">−</span>
                                </a>
                            </div>
                        </div>
                        <div class="leaflet-top leaflet-right"></div>
                        <div class="leaflet-bottom leaflet-left"></div>
                        <div class="leaflet-bottom leaflet-right">
                            <div class="leaflet-control-attribution leaflet-control">
                                <a href="https://leafletjs.com" title="A JavaScript library for interactive maps">
                                    <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8" class="leaflet-attribution-flag">
                                        <path fill="#4C7BE1" d="M0 0h12v4H0z"></path>
                                        <path fill="#FFD500" d="M0 4h12v3H0z"></path>
                                        <path fill="#E0BC00" d="M0 7h12v1H0z"></path>
                                    </svg> Leaflet
                                </a> 
                                <span aria-hidden="true">|</span> © OpenStreetMap
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- User screen -->
            <div class="user-screen" id="userScreen">
                <div class="title">Are you a staff?</div>
                <div class="options">
                    <div class="option">
                        <img src="">
                        <div class="label"></div>
                    </div>
                    <div class="option">
                        <img src="">
                        <div class="label"></div>
                    </div>
                </div>
            </div>
            <!-- About -->
            <div class="info-tab" id="infoTab">
                <div class="info-header">
                    <button class="back-button" onclick="hideInfo()" aria-label="Go back">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                        Back
                    </button>
                    <div class="title">About</div>
                    <div class="title-spacer"></div>
                </div>
            </div>
            <!-- Resources -->
            <div class="resources-tab" id="resTab">
                <div class="resources-header">
                    <button class="back-button" onclick="hideResources()" aria-label="Go back">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                        Back
                    </button>
                    <div class="title">Resources</div>
                    <div class="title-spacer"></div>
                </div>
            </div>
        </div>
        <script src="script.js" defer></script>
    </body>
</html>
